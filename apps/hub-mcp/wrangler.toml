# Cortex Hub MCP Server
name = "cortex-hub"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Enable workers.dev subdomain
workers_dev = true

# Custom domain route (configure via Cloudflare dashboard)
# routes = [{ pattern = "mcp.hub.your-domain.com", custom_domain = true }]

# Backend service URLs — SET VIA wrangler secret put, NOT here
# Run these after deploying:
#   wrangler secret put QDRANT_URL
#   wrangler secret put MEM9_URL
#   wrangler secret put CLIPROXY_URL
#   wrangler secret put DASHBOARD_API_URL
[vars]

# MCP Server metadata
MCP_SERVER_NAME = "cortex-hub"
MCP_SERVER_VERSION = "0.1.0"
