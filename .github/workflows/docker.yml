name: Build and Publish Docker Image

on:
  push:
    branches: [master]
    paths:
      - 'apps/dashboard-api/**'
      - 'apps/dashboard-web/**'
      - 'apps/hub-mcp/**'
      - 'packages/**'
      - 'infra/Dockerfile.dashboard-api'
      - 'infra/Dockerfile.hub-mcp'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for cortex-api
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/lktiep/cortex-api
          tags: |
            type=raw,value=latest
            type=sha

      - name: Extract metadata for cortex-mcp
        id: meta-mcp
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/lktiep/cortex-mcp
          tags: |
            type=raw,value=latest
            type=sha

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push cortex-api
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.dashboard-api
          push: true
          build-args: |
            COMMIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push cortex-mcp
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.hub-mcp
          push: true
          build-args: |
            COMMIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          tags: ${{ steps.meta-mcp.outputs.tags }}
          labels: ${{ steps.meta-mcp.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
