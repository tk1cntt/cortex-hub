name: Build and Publish Docker Images

on:
  push:
    branches: [master]
    paths:
      - 'apps/dashboard-api/**'
      - 'apps/dashboard-web/**'
      - 'apps/hub-mcp/**'
      - 'packages/**'
      - 'infra/Dockerfile.*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  # ── cortex-api (dashboard-api + dashboard-web) ──
  build-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/lktiep/cortex-api
          tags: |
            type=raw,value=latest
            type=sha

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.dashboard-api
          push: true
          build-args: |
            COMMIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=cortex-api
          cache-to: type=gha,scope=cortex-api,mode=max

  # ── cortex-mcp (hub-mcp) ──
  build-mcp:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/lktiep/cortex-mcp
          tags: |
            type=raw,value=latest
            type=sha

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.hub-mcp
          push: true
          build-args: |
            COMMIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=cortex-mcp
          cache-to: type=gha,scope=cortex-mcp,mode=max

  # ── cortex-gitnexus ──
  build-gitnexus:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/lktiep/cortex-gitnexus
          tags: |
            type=raw,value=latest
            type=sha

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.gitnexus
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=cortex-gitnexus
          cache-to: type=gha,scope=cortex-gitnexus,mode=max
