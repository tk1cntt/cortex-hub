pre-commit:
  parallel: true
  commands:
    pnpm_build:
      run: pnpm build
    pnpm_typecheck:
      run: pnpm typecheck
    pnpm_lint:
      run: pnpm lint

pre-push:
  parallel: true
  commands:
    pnpm_build:
      run: pnpm build
    pnpm_typecheck:
      run: pnpm typecheck
    pnpm_lint:
      run: pnpm lint
    pnpm_test:
      run: pnpm test

post-push:
  commands:
    notify_cortex:
      run: >
        if [ -n "$CORTEX_API_URL" ]; then
        BRANCH=$(git rev-parse --abbrev-ref HEAD);
        REPO=$(git remote get-url origin 2>/dev/null || echo "");
        SHA=$(git rev-parse HEAD);
        MSG=$(git log -1 --pretty=%s);
        FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | python3 -c "import sys,json; print(json.dumps([l.strip() for l in sys.stdin if l.strip()]))" 2>/dev/null || echo "[]");
        curl -s -X POST "$CORTEX_API_URL/api/webhooks/push"
        -H "Content-Type: application/json"
        -H "Authorization: Bearer ${HUB_API_KEY:-}"
        -d "{\"repo\":\"$REPO\",\"branch\":\"$BRANCH\",\"commitSha\":\"$SHA\",\"commitMessage\":\"$MSG\",\"filesChanged\":$FILES}"
        > /dev/null 2>&1 || true;
        fi
