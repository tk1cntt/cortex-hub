# Auto-generated by cortex install.sh — per-stack pipelines
# Each command only runs when relevant files are changed (glob filter)

pre-commit:
  parallel: true
  commands:
    pnpm_build:
      glob: "**/*.{ts,tsx,js,jsx,json,css,scss}"
      run: pnpm build
    pnpm_typecheck:
      glob: "**/*.{ts,tsx,js,jsx,json,css,scss}"
      run: pnpm typecheck
    pnpm_lint:
      glob: "**/*.{ts,tsx,js,jsx,json,css,scss}"
      run: pnpm lint

pre-push:
  parallel: true
  commands:
    pnpm_build:
      glob: "**/*.{ts,tsx,js,jsx,json,css,scss}"
      run: pnpm build
    pnpm_typecheck:
      glob: "**/*.{ts,tsx,js,jsx,json,css,scss}"
      run: pnpm typecheck
    pnpm_lint:
      glob: "**/*.{ts,tsx,js,jsx,json,css,scss}"
      run: pnpm lint
    pnpm_test:
      glob: "**/*.{ts,tsx,js,jsx,json,css,scss}"
      run: pnpm test

post-push:
  commands:
    notify_cortex:
      run: |
        if [ -n "$CORTEX_API_URL" ]; then
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          REPO=$(git remote get-url origin 2>/dev/null || echo "")
          COMMIT_SHA=$(git rev-parse HEAD)
          COMMIT_MSG=$(git log -1 --pretty=%s)
          curl -s -X POST "$CORTEX_API_URL/api/webhooks/local-push" \
            -H "Content-Type: application/json" \
            -d "{\"repo\":\"$REPO\",\"branch\":\"$BRANCH\",\"commitSha\":\"$COMMIT_SHA\",\"commitMessage\":\"$COMMIT_MSG\"}" \
            > /dev/null 2>&1 || true
        fi
