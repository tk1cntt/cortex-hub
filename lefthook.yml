pre-commit:
  parallel: true
  commands:
    pnpm_build:
      run: pnpm build
    pnpm_typecheck:
      run: pnpm typecheck
    pnpm_lint:
      run: pnpm lint

pre-push:
  parallel: true
  commands:
    pnpm_build:
      run: pnpm build
    pnpm_typecheck:
      run: pnpm typecheck
    pnpm_lint:
      run: pnpm lint
    pnpm_test:
      run: pnpm test

post-push:
  commands:
    notify_cortex:
      run: |
        if [ -n "$CORTEX_API_URL" ]; then
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          REPO=$(git remote get-url origin 2>/dev/null || echo "")
          COMMIT_SHA=$(git rev-parse HEAD)
          COMMIT_MSG=$(git log -1 --pretty=%s)
          FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | jq -R -s 'split("\n") | map(select(. != ""))' 2>/dev/null || echo "[]")
          curl -s -X POST "$CORTEX_API_URL/api/webhooks/local-push" \
            -H "Content-Type: application/json" \
            -d "{\"repo\":\"$REPO\",\"branch\":\"$BRANCH\",\"commitSha\":\"$COMMIT_SHA\",\"commitMessage\":\"$COMMIT_MSG\",\"filesChanged\":$FILES}" \
            > /dev/null 2>&1 || true
        fi
