# Cortex Hub — Docker Compose Stack
# Services: CLIProxy (LLM Gateway), Qdrant, GitNexus, Dashboard API, Hub MCP
# CLIProxy provides OpenAI-compatible API via OAuth — no API key required
# mem9 runs in-process within the Dashboard API container
# GitNexus runs as a standalone eval-server for code intelligence

services:
  # ─────────────────────────────────────────────
  # Qdrant — Vector Database
  # ─────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.13.6
    container_name: cortex-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "bash -c '(echo > /dev/tcp/localhost/6333) 2>/dev/null'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─────────────────────────────────────────────
  # CLIProxy — LLM Gateway (OAuth-based)
  # API:  http://localhost:8317/v1 (OpenAI-compatible)
  # Zero SQL, zero Redis — just config + OAuth tokens
  # ─────────────────────────────────────────────
  llm-proxy:
    image: eceasy/cli-proxy-api:latest
    container_name: cortex-llm-proxy
    restart: unless-stopped
    ports:
      - "8317:8317"   # OpenAI-compatible API
    volumes:
      - cliproxy-auth:/CLIProxyAPI/auth
      - ./cliproxy-config.yaml:/CLIProxyAPI/config.yaml
    environment:
      TZ: Asia/Ho_Chi_Minh
      MANAGEMENT_PASSWORD: ${MANAGEMENT_PASSWORD:-cortex2026}
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "(echo > /dev/tcp/localhost/8317) 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─────────────────────────────────────────────
  # GitNexus — Code Intelligence Service
  # API:  http://localhost:4848 (eval-server)
  # Provides: AST graph search, impact analysis, symbol context
  # ─────────────────────────────────────────────
  gitnexus:
    build:
      context: ..
      dockerfile: infra/Dockerfile.gitnexus
    image: ghcr.io/lktiep/cortex-gitnexus:latest
    container_name: cortex-gitnexus
    restart: unless-stopped
    ports:
      - "4848:4848"
    volumes:
      - api-data:/app/data
      - gitnexus-data:/root/.gitnexus
    environment:
      PORT: 4848
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:4848/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─────────────────────────────────────────────
  # Cortex Dashboard API (+ Dashboard Web static)
  # ─────────────────────────────────────────────
  cortex-api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.dashboard-api
      args:
        COMMIT_SHA: ${COMMIT_SHA:-dev}
        BUILD_DATE: ${BUILD_DATE:-}
    image: ghcr.io/lktiep/cortex-api:latest
    container_name: cortex-api
    restart: unless-stopped
    ports:
      - "4000:4000"
      - "3000:4000" # Backward compatibility for dashboard port
    volumes:
      - api-data:/app/data
      - gitnexus-data:/root/.gitnexus
      - cliproxy-auth:/app/cliproxy-auth
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      PORT: 4000
      NODE_ENV: production
      DATABASE_PATH: /app/data/cortex.db
      QDRANT_URL: http://qdrant:6333
      OPENAI_API_KEY: ${OPENAI_API_KEY:-proxy-key}
      OPENAI_API_BASE: http://llm-proxy:8317/v1
      LLM_PROXY_URL: http://llm-proxy:8317
      CLIPROXY_AUTH_DIR: /app/cliproxy-auth
      CLIPROXY_MANAGEMENT_KEY: ${MANAGEMENT_PASSWORD:-cortex2026}
      DASHBOARD_URL: ${DASHBOARD_URL:-https://hub.jackle.dev}
      # mem9 Configuration
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      MEM9_LLM_MODEL: ${MEM9_LLM_MODEL:-gpt-5.4-mini}
      MEM9_EMBEDDING_MODEL: ${MEM9_EMBEDDING_MODEL:-gemini-embedding-2-preview}
      # GitNexus
      GITNEXUS_URL: http://gitnexus:4848
    depends_on:
      qdrant:
        condition: service_healthy
      gitnexus:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:4000/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─────────────────────────────────────────────
  # Cortex Hub MCP Gateway (standalone)
  # ─────────────────────────────────────────────
  cortex-mcp:
    build:
      context: ..
      dockerfile: infra/Dockerfile.hub-mcp
    image: ghcr.io/lktiep/cortex-mcp:latest
    container_name: cortex-mcp
    restart: unless-stopped
    ports:
      - "8318:8317"
    environment:
      PORT: 8317
      NODE_ENV: production
      DASHBOARD_API_URL: http://cortex-api:4000
      QDRANT_URL: http://qdrant:6333
      CLIPROXY_URL: http://llm-proxy:8317
      GITNEXUS_URL: http://gitnexus:4848
      MCP_SERVER_NAME: "cortex-hub"
      MCP_SERVER_VERSION: "0.1.0"
      API_KEYS: ${MCP_API_KEYS:-}
    depends_on:
      cortex-api:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      gitnexus:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:8317/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─────────────────────────────────────────────
  # Watchtower — Auto-update containers
  # ─────────────────────────────────────────────
  watchtower:
    image: containrrr/watchtower:latest
    container_name: cortex-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: 300
      WATCHTOWER_LABEL_ENABLE: "false"
      DOCKER_API_VERSION: "1.43"
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  qdrant-data:
    name: cortex-qdrant-data
  api-data:
    name: cortex-api-data
  gitnexus-data:
    name: cortex-gitnexus-data
  cliproxy-auth:
    name: cortex-cliproxy-auth
