# CLIProxy API — Configuration
# Docs: https://github.com/nicepkg/CLIProxyAPI

# Server port
port: 8317
# Bind to all interfaces (for Docker)
host: ""
# Auth directory (persisted via Docker volume)
auth-dir: /CLIProxyAPI/auth
# Debug logging
debug: false
# Remote management (for onboarding via web)
remote-management:
  allow-remote: true
  secret-key: "${MANAGEMENT_PASSWORD}"
# OpenAI-compatible endpoints
# API key is synced from Codex OAuth by dashboard-api startup
openai-compatibility:
  - name: "cortex-openai"
    base-url: "https://api.openai.com/v1"
    api-key-entries:
      - api-key: "${OPENAI_API_KEY:-placeholder}"
    models:
      - name: "text-embedding-3-small"
        alias: "text-embedding-3-small"
      - name: "text-embedding-3-large"
        alias: "text-embedding-3-large"
      - name: "gpt-5.4-mini"
        alias: "gpt-5.4-mini"
