server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── API proxy — forward to internal Dashboard API (Docker network) ──
    # Browser calls /api/* → nginx → cortex-api:4000
    location /api/ {
        proxy_pass http://cortex-api:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── MCP Health proxy — forward to MCP container ──
    # Browser calls /mcp/health → nginx → cortex-api:4000/mcp/health → MCP container
    location /mcp/ {
        proxy_pass http://cortex-api:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    location /health {
        proxy_pass http://cortex-api:4000;
        proxy_set_header Host $host;
    }

    # ── WebSocket proxy for Conductor ──
    location /ws/ {
        proxy_pass http://cortex-api:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # SPA fallback — try static file first, then index.html
    location / {
        try_files $uri $uri.html $uri/index.html /index.html;

        # Prevent caching of HTML pages (Cloudflare edge + browser)
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    # Cache static assets (hashed filenames = safe to cache forever)
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;
}
