server {
    listen 3000;
    server_name _;

    # Docker embedded DNS — re-resolve on every request so nginx picks up
    # new container IPs after cortex-api restarts (prevents 502 stale DNS).
    resolver 127.0.0.11 valid=5s ipv6=off;
    set $upstream_api http://cortex-api:4000;

    root /usr/share/nginx/html;
    index index.html;

    # ── API proxy — forward to internal Dashboard API (Docker network) ──
    # This eliminates the need to expose cortex-api.jackle.dev publicly.
    # All browser API calls go through hub.jackle.dev (protected by CF Access).
    location /api/ {
        proxy_pass $upstream_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    location /health {
        proxy_pass $upstream_api;
        proxy_set_header Host $host;
    }

    # ── WebSocket proxy for Conductor ──
    location /ws/ {
        proxy_pass $upstream_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # SPA fallback — try static file first, then index.html
    location / {
        try_files $uri $uri.html $uri/index.html /index.html;

        # Prevent caching of HTML pages (Cloudflare edge + browser)
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    # Cache static assets (hashed filenames = safe to cache forever)
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;
}
